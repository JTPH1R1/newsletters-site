name: 🔥 Generate Daily Newsletter

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests --quiet
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/generate_newsletter.py
      - name: Check changes
        id: chk
        run: git diff --quiet src/content/newsletters/ && echo "new=false" >> $GITHUB_OUTPUT || echo "new=true" >> $GITHUB_OUTPUT
      - name: Commit newsletter
        if: steps.chk.outputs.new == 'true'
        run: |
          git config user.name "Flame of Fortune Bot"
          git config user.email "bot@flameoffortune.com"
          git add src/content/newsletters/
          git commit -m "🔥 Newsletter $(date +'%Y-%m-%d') — auto-generated"
          git push
      - run: npm run build
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-branch: main
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
